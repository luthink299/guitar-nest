    .gn-card{position:relative;background:#FBF5E8;border:1.5px solid #E8C9A6;border-radius:28px;
      padding:0 0 34px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(120,60,20,.16);
      display:flex;flex-direction:column;align-items:center;overflow:hidden;}
    .gn-hero{width:100%;height:230px;object-fit:cover;object-position:center 30%;display:block;}
    .gn-hero-wrap{position:relative;width:100%;}
    .gn-hero-wrap::after{content:'';position:absolute;inset:0;
      background:linear-gradient(to bottom,rgba(251,245,232,0) 55%,#FBF5E8 100%);}
    .gn-body{padding:0 34px;width:100%;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;margin-top:-6px;}
    .gn-title{font-family:'Fraunces',Georgia,serif;font-weight:800;font-size:30px;color:#A4521C;
      letter-spacing:-.5px;margin:4px 0;text-align:center;}
    .gn-sub{font-size:13px;color:#7A5C3F;margin-bottom:24px;text-align:center;}
    .gn-sub strong{color:#A4521C;}
    .gn-label{font-family:'Be Vietnam Pro',sans-serif;font-size:13px;font-weight:600;
      color:#7A5C3F;align-self:flex-start;margin-bottom:7px;}
    .gn-input-wrap{position:relative;width:100%;margin-bottom:8px;}
    .gn-input{width:100%;box-sizing:border-box;padding:13px 46px 13px 16px;
      font-family:'Be Vietnam Pro',sans-serif;font-size:15px;color:#42301E;
      background:#F5ECD9;border:1.5px solid #E8C9A6;border-radius:14px;outline:none;transition:.15s;}
    .gn-input:focus{border-color:#BE6526;box-shadow:0 0 0 3px rgba(190,101,38,.15);}
    .gn-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:#7A5C3F;padding:4px;line-height:0;}
    .gn-btn{width:100%;margin-top:10px;padding:14px;font-family:'Be Vietnam Pro',sans-serif;
      font-size:15px;font-weight:700;color:#fff;background:#BE6526;border:none;border-radius:14px;
      cursor:pointer;transition:.16s;box-shadow:0 6px 18px rgba(160,82,28,.32);}
    .gn-btn:hover{background:#A4521C;}
    .gn-btn:active{transform:scale(.98);}
    .gn-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .gn-err{font-size:13px;color:#C0392B;min-height:18px;text-align:center;margin-top:4px;font-weight:600;}
    .gn-shake{animation:gnShake .4s ease;}
    @keyframes gnShake{0%,100%{transform:none}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

    .gn-divider{display:flex;align-items:center;gap:10px;width:100%;margin:14px 0 12px;}

    .gn-register{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;}
    .gn-reg-btn{display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;padding:13px;font-family:'Be Vietnam Pro',sans-serif;

      border:2px solid #E8C9A6;border-radius:14px;text-decoration:none;
      transition:.16s;box-shadow:0 3px 10px rgba(120,60,20,.10);}
    .gn-reg-btn:hover{background:#F5ECD9;border-color:#C26A2C;}
    .gn-reg-btn svg{flex:none;}
    .gn-reg-note{font-size:11.5px;color:#7A5C3F;text-align:center;}
